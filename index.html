<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 网球教练平台 · DC/MD/VA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #0a2e1a 0%, #0d3b23 50%, #1a5c38 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: white; border-radius: 24px; padding: 48px 40px; width: 420px; max-width: 95vw; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.4); position: relative; }
.lang-toggle { position: absolute; top: 16px; right: 16px; display: flex; gap: 6px; }
.lang-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid #e8e8e8; background: white; color: #999; transition: all 0.15s; font-family: inherit; }
.lang-btn.active { background: #1a6b3a; color: white; border-color: #1a6b3a; }
.logo { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, #0d3b23, #2d9a57); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(13,59,35,0.4); }
h1 { font-size: 24px; font-weight: 900; color: #111; margin-bottom: 6px; }
.sub { font-size: 13px; color: #999; margin-bottom: 36px; }
.btn { display: block; width: 100%; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; text-decoration: none; margin-bottom: 14px; transition: opacity 0.15s; font-family: inherit; cursor: pointer; border: none; }
.btn-client { background: linear-gradient(135deg, #1a6b3a, #2d9a57); color: white; box-shadow: 0 4px 16px rgba(26,107,58,0.35); }
.btn-admin { background: #f7f8fa; color: #333; border: 1.5px solid #e8e8e8; }
.btn:hover { opacity: 0.88; }
.btn-sub { font-size: 11px; font-weight: 400; opacity: 0.75; display: block; margin-top: 3px; }
.divider { height: 1px; background: #f0f0f0; margin: 20px 0; }
.footer { font-size: 11px; color: #bbb; margin-top: 8px; }
</style>
<script>
// Forward password reset links
var hash = window.location.hash;
if(hash.includes('access_token') && hash.includes('type=recovery')) {
  window.location.href = '/tennis-client.html' + hash;
}

// Read saved language (shared with tennis-client.html via localStorage)
var currentLang = localStorage.getItem('lang') || 'zh';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang); // tennis-client.html reads this same key
  if(lang === 'en') {
    document.getElementById('title').textContent = 'Tennis Coaching Platform';
    document.getElementById('subtitle').textContent = 'DC · MD · VA Tennis Community';
    document.getElementById('client-btn').innerHTML = '🎾 Student Portal<span class="btn-sub">Browse coaches · Book lessons · View bookings</span>';
    document.getElementById('admin-btn').innerHTML = '⚙️ Admin Dashboard<span class="btn-sub">Platform administrators only</span>';
    document.getElementById('lang-zh').classList.remove('active');
    document.getElementById('lang-en').classList.add('active');
  } else {
    document.getElementById('title').textContent = '网球教练平台';
    document.getElementById('subtitle').textContent = 'DC · MD · VA 华人网球社区';
    document.getElementById('client-btn').innerHTML = '🎾 学员入口<span class="btn-sub">浏览教练 · 在线约课 · 查看预约</span>';
    document.getElementById('admin-btn').innerHTML = '⚙️ 管理后台<span class="btn-sub">平台管理员专用</span>';
    document.getElementById('lang-zh').classList.add('active');
    document.getElementById('lang-en').classList.remove('active');
  }
}

// Apply on load
window.onload = function() { setLang(currentLang); };
</script>
</head>
<body>
<div class="card">
  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
  </div>
  <div class="logo">🎾</div>
  <h1 id="title">网球教练平台</h1>
  <p class="sub" id="subtitle">DC · MD · VA 华人网球社区</p>
  <!-- Always link to tennis-client.html — language is passed via localStorage -->
  <a class="btn btn-client" id="client-btn" href="/tennis-client.html">
    🎾 学员入口
    <span class="btn-sub">浏览教练 · 在线约课 · 查看预约</span>
  </a>
  <div class="divider"></div>
  <a class="btn btn-admin" id="admin-btn" href="/tennis-admin.html">
    ⚙️ 管理后台
    <span class="btn-sub">平台管理员专用</span>
  </a>
  <p class="footer" id="footer">© 2026 Tennis Platform DC/MD/VA</p>
</div>
</body>
</html>
